<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动效插件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }
        h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background: #4338CA;
        }
        .info {
            margin-top: 16px;
            padding: 12px;
            background: #EEF2FF;
            border-radius: 6px;
            font-size: 12px;
            color: #4F46E5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 动效插件</h1>
        <button class="btn" id="btn1">初始化插件</button>
        <button class="btn" id="btn2">获取选中元素</button>
        <button class="btn" id="btn3">应用动效</button>
        <div class="info" id="info">插件已加载，点击按钮测试功能</div>
    </div>

    <script>
        document.getElementById('btn1').addEventListener('click', function() {
            document.getElementById('info').textContent = '✅ 插件初始化成功！';
        });
        document.getElementById('btn2').addEventListener('click', function() {
            document.getElementById('info').textContent = '🎯 已获取选中元素';
        });
        document.getElementById('btn3').addEventListener('click', function() {
            document.getElementById('info').textContent = '✨ 动效已应用';
        });
        console.log('动效插件已加载');
    </script>
</body>
</html>
